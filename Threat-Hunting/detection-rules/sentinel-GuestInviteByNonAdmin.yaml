id: 8e24a6b3-5d90-4c71-b538-0f7a9c6e4d12
name: Guest User Invited by Non-Admin
description: |
  Detects guest user invitations issued by a non-admin user. Guest invites are a
  classic supply-chain / persistence vector — attackers invite their own burner
  identities into the tenant and use them as a covert foothold. Legitimate guest
  invitations should normally be issued by Helpdesk / HR / Guest Inviter role
  holders, not arbitrary end users.
severity: Medium
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - AuditLogs
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
  - Persistence
relevantTechniques:
  - T1136.003
  - T1098
query: |
  let AuthorizedInviters = _GetWatchlist('AuthorizedGuestInviters') | project UserPrincipalName = tostring(UserPrincipalName);
  AuditLogs
  | where TimeGenerated > ago(1h)
  | where OperationName in ("Invite external user", "Add user", "Add user sponsor")
  | extend InvitedUser = tostring(TargetResources[0].userPrincipalName)
  | extend InvitedEmail = tostring(parse_json(tostring(TargetResources[0].modifiedProperties))[0].newValue)
  | extend InitiatedByUser = tostring(parse_json(tostring(InitiatedBy.user)).userPrincipalName)
  | where InitiatedByUser !in~ (AuthorizedInviters)
  | project TimeGenerated, InitiatedByUser, InvitedUser, InvitedEmail, OperationName, Result
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: InitiatedByUser
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: InvitedUser
version: 1.0.0
kind: Scheduled
