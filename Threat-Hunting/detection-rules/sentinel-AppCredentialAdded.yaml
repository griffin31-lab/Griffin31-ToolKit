id: c3f17d68-9e24-4b35-8a01-6d5c4b0e2a83
name: New Credential (Secret or Certificate) Added to Entra App
description: |
  Fires when a new client secret or X.509 certificate is added to an existing
  Entra application or service principal. This is a textbook persistence
  technique — the attacker who compromises an admin identity long enough to add
  a fresh secret then retains API-level access to the tenant even after the
  original credential is rotated.
severity: High
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - AuditLogs
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Persistence
  - PrivilegeEscalation
relevantTechniques:
  - T1098.001
  - T1550.001
query: |
  AuditLogs
  | where TimeGenerated > ago(1h)
  | where OperationName in ("Update application - Certificates and secrets management", "Update application – Certificates and secrets management", "Update service principal", "Add service principal credentials", "Update application")
  | mv-expand tr = TargetResources
  | extend ModifiedProps = tostring(tr.modifiedProperties)
  | where ModifiedProps has "KeyCredentials" or ModifiedProps has "PasswordCredentials"
  | extend AppName = tostring(tr.displayName)
  | extend AppId = tostring(tr.id)
  | extend InitiatedByUser = tostring(parse_json(tostring(InitiatedBy.user)).userPrincipalName)
  | extend InitiatedByApp = tostring(parse_json(tostring(InitiatedBy.app)).displayName)
  | project TimeGenerated, AppName, AppId, InitiatedByUser, InitiatedByApp, OperationName, Result, CorrelationId, ModifiedProps
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: InitiatedByUser
  - entityType: CloudApplication
    fieldMappings:
      - identifier: AppId
        columnName: AppId
      - identifier: Name
        columnName: AppName
version: 1.0.0
kind: Scheduled
